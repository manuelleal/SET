<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Docente — English Placement Exam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F4EEE2; --paper:#FFFDF8; --surface:#FFFFFF; --ink:#26252B; --muted:#736E63; --line:#E7DECB;
    --primary:#15756E; --primary-d:#0F5B55; --primary-soft:#E2F0EE; --accent:#E1A33B;
    --ok:#2E7D5B; --ok-bg:#E7F4EC; --err:#C2553F; --err-bg:#FBEAE5;
    --shadow:0 10px 30px -12px rgba(40,35,20,.25); --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Mulish',system-ui,sans-serif;color:var(--ink);line-height:1.55;
    background:radial-gradient(1200px 600px at 100% -10%,#FBF4E5,transparent 60%),
               radial-gradient(900px 500px at -10% 110%,#EAF3F1,transparent 55%),var(--bg);min-height:100vh}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 18px 60px}
  h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif;letter-spacing:-.01em}
  h2{font-size:1.6rem;font-weight:600}
  .muted{color:var(--muted)} .hidden{display:none!important}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .brand .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#1b9a8f);
    color:#fff;display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;font-size:1.25rem}
  .brand .t{font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem}
  .brand .s{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
  .eyebrow{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--primary);background:var(--primary-soft);padding:5px 11px;border-radius:999px;margin-bottom:12px}
  label{display:block;font-weight:600;font-size:.88rem;margin:12px 0 6px}
  input,select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:11px;font-family:inherit;font-size:1rem;background:var(--paper);color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  button{font-family:inherit;font-weight:700;cursor:pointer;border:none;border-radius:11px;padding:12px 18px;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--primary-d));box-shadow:0 8px 20px -10px rgba(21,117,110,.8);transition:.18s}
  button:hover{transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--muted);box-shadow:none;border:1.5px solid var(--line)}
  .btn-block{width:100%;margin-top:10px}

  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .kpi .n{font-family:'Fraunces',serif;font-weight:700;font-size:2rem;color:var(--primary);line-height:1}
  .kpi .l{font-size:.82rem;color:var(--muted);margin-top:4px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.cols{grid-template-columns:1fr}}

  .barline{margin:10px 0}
  .barline .lab{display:flex;justify-content:space-between;font-size:.86rem;font-weight:600;margin-bottom:5px}
  .barline .lab .v{font-family:'Fraunces',serif;color:var(--primary-d)}
  .bar{height:12px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--primary))}

  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
  .filters > div{flex:1;min-width:160px}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line)}
  th{font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);cursor:pointer;user-select:none}
  tbody tr{cursor:pointer;transition:.12s}
  tbody tr:hover{background:var(--paper)}
  .chip{display:inline-block;font-weight:700;font-size:.78rem;padding:3px 10px;border-radius:999px;background:var(--primary-soft);color:var(--primary-d)}
  .flag{color:var(--err);font-weight:700}
  .scroll{overflow-x:auto}

  .modal{position:fixed;inset:0;background:rgba(30,26,15,.45);display:none;place-items:center;padding:20px;z-index:60}
  .modal.show{display:grid}
  .modal .box{background:var(--surface);border-radius:var(--radius);max-width:640px;width:100%;max-height:88vh;overflow:auto;padding:24px;box-shadow:var(--shadow)}
  .pill{display:inline-block;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:4px 11px;font-size:.8rem;margin:3px 4px 3px 0}
  .wbox{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:6px;white-space:pre-wrap;font-size:.9rem}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;
    padding:12px 18px;border-radius:12px;font-weight:600;font-size:.9rem;transition:.35s;z-index:80}
  .toast.show{transform:translateX(-50%) translateY(0)} .toast.warn{background:var(--err)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">D</div>
    <div><div class="t">Panel Docente</div><div class="s">English Placement Exam</div></div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="card" style="max-width:460px;margin:0 auto">
    <span class="eyebrow">Acceso docente</span>
    <h2>Iniciar sesión</h2>
    <p class="muted" style="font-size:.9rem">Solo docentes autorizados. Ingresa con tu correo y contraseña.</p>
    <label>Email</label><input id="l-email" type="email" placeholder="docente@correo.com">
    <label>Contraseña</label><input id="l-pass" type="password" placeholder="••••••••">
    <button class="btn-block" onclick="login()">Entrar</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="hidden">
    <div class="top">
      <h2>Resultados</h2>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" onclick="exportCSV()">⬇️ Exportar CSV</button>
        <button class="btn-ghost" onclick="loadData()">↻ Actualizar</button>
        <button class="btn-ghost" onclick="logout()">Salir</button>
      </div>
    </div>

    <div class="kpis" id="kpis"></div>

    <div class="cols">
      <div class="card"><span class="eyebrow">Distribución por nivel CEFR</span><div id="cefr-dist"></div></div>
      <div class="card"><span class="eyebrow">Promedio por destreza</span><div id="skill-avg"></div></div>
    </div>

    <div class="card">
      <div class="filters">
        <div><label>Filtrar por ficha</label><select id="f-ficha" onchange="render()"><option value="">Todas</option></select></div>
        <div><label>Filtrar por nivel</label><select id="f-cefr" onchange="render()">
          <option value="">Todos</option><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option></select></div>
        <div><label>Buscar nombre / documento</label><input id="f-q" oninput="render()" placeholder="Escribe para buscar..."></div>
      </div>
      <div class="scroll">
        <table id="tbl">
          <thead><tr>
            <th data-k="nombre">Estudiante</th>
            <th data-k="ficha">Ficha</th>
            <th data-k="nivel_cefr">CEFR</th>
            <th data-k="score_total">Total</th>
            <th data-k="score_reading">Read</th>
            <th data-k="score_listening">List</th>
            <th data-k="score_grammar">Gram</th>
            <th data-k="score_vocabulary">Voc</th>
            <th data-k="score_writing">Writ</th>
            <th data-k="duracion_seg">Tiempo</th>
            <th data-k="created_at">Fecha</th>
            <th>⚠️</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p class="muted" id="count" style="font-size:.82rem;margin-top:10px"></p>
    </div>
  </div>
</div>

<!-- detail modal -->
<div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="box" id="modal-box"></div>
</div>
<div class="toast" id="toast"></div>

<script>
let sb=null, rows=[], sortKey='score_total', sortDir=-1;
/* Llaves PÚBLICAS fijas: el docente solo escribe correo y contraseña.
   El anon key es seguro (RLS: el público no puede leer; solo un usuario autenticado lee). */
const SUPABASE_URL = 'https://sacugfirjijrizcpsihn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhY3VnZmlyamlqcml6Y3BzaWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjUwMDMsImV4cCI6MjA5Nzc0MTAwM30.amTi6bZ350kAML-UQgMlghCz7ZoQD6esfpfZa7DRSlE';
const $=id=>document.getElementById(id);
const CEFRS=['A1','A2','B1','B2','C1','C2'];
function toast(m,w){const t=$('toast');t.textContent=m;t.className='toast show'+(w?' warn':'');setTimeout(()=>t.className='toast'+(w?' warn':''),3000);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtTime(sec){ if(sec==null) return '—'; const m=Math.floor(sec/60), s=sec%60; return `${m}m ${String(s).padStart(2,'0')}s`; }
function fmtDate(d){ if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString()+' '+x.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
const TLAB={tab_switch:'Cambios de pestaña',blur:'Cambio de app (foco)',copy:'Copiar',cut:'Cortar',paste:'Pegar',contextmenu:'Clic derecho / traducir',devtools:'Herram. de desarrollador',shortcut:'Atajos de teclado',print:'Imprimir'};
function telemetryHTML(r){
  const tm=r.telemetria||{};
  const items=Object.keys(TLAB).filter(k=>(tm[k]||0)>0).map(k=>`<span class="pill">${TLAB[k]}: <b>${tm[k]}</b></span>`);
  const tot=(r.alertas!=null)?r.alertas:((r.cambios_pestana||0)+(r.pegados||0));
  if(!items.length && !r.sospechoso)
    return `<div style="background:var(--ok-bg);border:1px solid #cde8d7;border-radius:10px;padding:10px 12px;color:var(--ok);font-weight:600;font-size:.86rem;margin-bottom:12px">✅ Sin irregularidades detectadas</div>`;
  const style=r.sospechoso?'background:var(--err-bg);border:1px solid #f1c4b8;color:var(--err)':'background:var(--paper);border:1px solid var(--line);color:var(--ink)';
  const head=r.sospechoso?`⚠️ Posible irregularidad (${tot} alertas)`:`Actividad registrada (${tot})`;
  return `<div style="${style};border-radius:10px;padding:10px 12px;font-size:.86rem;margin-bottom:12px">
    <div style="font-weight:700;margin-bottom:6px">${head}</div>${items.join(' ')||'<span class="muted">—</span>'}</div>`;
}

window.onload=()=>{ $('l-email').focus(); };

async function login(){
  const email=$('l-email').value.trim(), pass=$('l-pass').value;
  if(!email||!pass){ toast('Ingresa tu correo y contraseña.',true); return; }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  const { error }=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ toast('❌ '+error.message,true); return; }
  $('login').classList.add('hidden'); $('dash').classList.remove('hidden');
  loadData();
}
async function logout(){ if(sb) await sb.auth.signOut(); location.reload(); }

async function loadData(){
  const { data, error }=await sb.from('exam_results').select('*').order('created_at',{ascending:false});
  if(error){ toast('❌ '+error.message,true); return; }
  rows=data||[];
  // poblar fichas
  const fichas=[...new Set(rows.map(r=>r.ficha).filter(Boolean))].sort();
  $('f-ficha').innerHTML='<option value="">Todas</option>'+fichas.map(f=>`<option>${esc(f)}</option>`).join('');
  kpis(); distributions(); render();
  toast(`✅ ${rows.length} resultados cargados.`);
}

function passed(r){ return ['B1','B2','C1','C2'].includes(r.nivel_cefr); }

function kpis(){
  const n=rows.length;
  const avg=n? Math.round(rows.reduce((a,r)=>a+(r.score_total||0),0)/n):0;
  const passRate=n? Math.round(100*rows.filter(passed).length/n):0;
  const susp=rows.filter(r=>r.sospechoso).length;
  $('kpis').innerHTML=`
    <div class="kpi"><div class="n">${n}</div><div class="l">Exámenes presentados</div></div>
    <div class="kpi"><div class="n">${avg}%</div><div class="l">Puntaje promedio</div></div>
    <div class="kpi"><div class="n">${passRate}%</div><div class="l">Nivel B1 o superior</div></div>
    <div class="kpi"><div class="n">${susp}</div><div class="l">Con alerta de trampa</div></div>`;
}

function distributions(){
  const n=rows.length||1;
  const counts=Object.fromEntries(CEFRS.map(c=>[c,0]));
  rows.forEach(r=>{ if(counts[r.nivel_cefr]!=null) counts[r.nivel_cefr]++; });
  const max=Math.max(1,...Object.values(counts));
  $('cefr-dist').innerHTML=CEFRS.map(c=>`
    <div class="barline"><div class="lab"><span>${c}</span><span class="v">${counts[c]} (${Math.round(100*counts[c]/n)}%)</span></div>
    <div class="bar"><span style="width:${Math.round(100*counts[c]/max)}%"></span></div></div>`).join('');

  const skills=[['Reading','score_reading'],['Listening','score_listening'],['Grammar','score_grammar'],['Vocabulary','score_vocabulary'],['Writing','score_writing']];
  $('skill-avg').innerHTML=skills.map(([lab,k])=>{
    const avg=rows.length? Math.round(rows.reduce((a,r)=>a+(r[k]||0),0)/rows.length):0;
    return `<div class="barline"><div class="lab"><span>${lab}</span><span class="v">${avg}%</span></div>
      <div class="bar"><span style="width:${avg}%"></span></div></div>`;
  }).join('');
}

function filtered(){
  const ff=$('f-ficha').value, fc=$('f-cefr').value, q=$('f-q').value.trim().toLowerCase();
  let out=rows.filter(r=>(!ff||r.ficha===ff)&&(!fc||r.nivel_cefr===fc)&&
    (!q||(`${r.nombre} ${r.documento}`).toLowerCase().includes(q)));
  out.sort((a,b)=>{ let x=a[sortKey],y=b[sortKey];
    if(typeof x==='string'){x=(x||'').toLowerCase();y=(y||'').toLowerCase();}
    if(x==null)x=-Infinity; if(y==null)y=-Infinity;
    return x<y?-1*sortDir : x>y?1*sortDir : 0; });
  return out;
}
function render(){
  const data=filtered();
  $('tbody').innerHTML=data.map((r,i)=>`
    <tr onclick="detail(${rows.indexOf(r)})">
      <td><b>${esc(r.nombre)}</b><br><span class="muted" style="font-size:.8rem">${esc(r.tipo_documento||'')} ${esc(r.documento)}</span></td>
      <td>${esc(r.ficha||'—')}</td>
      <td><span class="chip">${esc(r.nivel_cefr||'—')}</span></td>
      <td><b>${r.score_total??'—'}%</b></td>
      <td>${r.score_reading??'—'}%</td><td>${r.score_listening??'—'}%</td><td>${r.score_grammar??'—'}%</td>
      <td>${r.score_vocabulary??'—'}%</td><td>${r.score_writing??'—'}%</td>
      <td>${fmtTime(r.duracion_seg)}</td>
      <td class="muted" style="font-size:.8rem">${fmtDate(r.created_at)}</td>
      <td>${r.sospechoso?`<span class="flag" title="Posible irregularidad">⚠️ ${r.alertas||''}</span>`:(r.alertas?`<span class="muted">${r.alertas}</span>`:'')}</td>
    </tr>`).join('') || `<tr><td colspan="12" class="muted" style="text-align:center;padding:24px">Sin resultados.</td></tr>`;
  $('count').textContent=`Mostrando ${data.length} de ${rows.length} resultados.`;
}

function detail(i){
  const r=rows[i]; if(!r) return;
  $('modal-box').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">
      <div><h2 style="font-size:1.3rem">${esc(r.nombre)}</h2>
        <div class="muted" style="font-size:.85rem">${esc(r.tipo_documento||'')} ${esc(r.documento)} ${r.ficha?'· Ficha '+esc(r.ficha):''}</div></div>
      <button class="btn-ghost" onclick="closeModal()" style="padding:6px 12px">✕</button>
    </div>
    <div style="margin:12px 0">
      <span class="pill">CEFR: <b>${esc(r.nivel_cefr)}</b></span>
      <span class="pill">Total: <b>${r.score_total}%</b></span>
      <span class="pill">Reading ${r.score_reading}%</span>
      <span class="pill">Listening ${r.score_listening}%</span>
      <span class="pill">Grammar ${r.score_grammar}%</span>
      <span class="pill">Vocabulary ${r.score_vocabulary}%</span>
      <span class="pill">Writing ${r.score_writing}%</span>
      <span class="pill">⏱️ ${fmtTime(r.duracion_seg)}</span>
    </div>
    ${telemetryHTML(r)}
    <h3 class="serif" style="font-size:1rem;margin-top:8px">Writing — Task 1</h3>
    <div class="wbox">${esc(r.writing_task1)||'<span class="muted">(vacío)</span>'}</div>
    <h3 class="serif" style="font-size:1rem;margin-top:10px">Writing — Task 2</h3>
    <div class="wbox">${esc(r.writing_task2)||'<span class="muted">(vacío)</span>'}</div>
    <h3 class="serif" style="font-size:1rem;margin-top:10px">Comentario de la IA</h3>
    <div class="wbox">${esc(r.writing_feedback)||'—'}</div>`;
  $('modal').classList.add('show');
}
function closeModal(){ $('modal').classList.remove('show'); }

document.querySelectorAll('th[data-k]').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=(k==='nombre'||k==='ficha')?1:-1; }
  render();
}));

function exportCSV(){
  const data=filtered();
  const cols=['nombre','tipo_documento','documento','ficha','programa','nivel_cefr','score_total','score_reading','score_listening','score_grammar','score_vocabulary','score_writing','duracion_seg','cambios_pestana','pegados','alertas','sospechoso','created_at'];
  const head=cols.join(',');
  const body=data.map(r=>cols.map(c=>{ let v=r[c]==null?'':String(r[c]); v=v.replace(/"/g,'""'); return /[",\n]/.test(v)?`"${v}"`:v; }).join(',')).join('\n');
  const blob=new Blob(['﻿'+head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='resultados_examen.csv'; a.click();
}
</script>
</body>
</html>
